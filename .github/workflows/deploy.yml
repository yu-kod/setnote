name: Deploy

on:
  # main が更新されたら理由を問わず必ずデプロイする。
  # 実ユーザーによる push/マージはこの push トリガーで起動し、
  # bot（GITHUB_TOKEN）マージは push が抑制されるため ci-gate.yml が
  # workflow_dispatch で明示的に起動する（GITHUB_TOKEN でも例外的に起動可能）。
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-1

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm run install:all

      - name: Build Lambda
        run: npm run build:lambda

      - name: Build Frontend
        run: npm run build:frontend

      - name: Terraform Apply
        working-directory: infra
        env:
          TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Get Terraform outputs
        id: tf
        working-directory: infra
        run: |
          echo "s3_bucket=$(terraform output -raw frontend_bucket_name)" >> "$GITHUB_OUTPUT"
          echo "cf_dist_id=$(terraform output -raw cloudfront_distribution_id)" >> "$GITHUB_OUTPUT"

      - name: Deploy Frontend to S3
        run: aws s3 sync frontend/dist/ s3://${{ steps.tf.outputs.s3_bucket }} --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ steps.tf.outputs.cf_dist_id }} --paths "/*"
