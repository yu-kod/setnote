name: Claude Code

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: '--allowedTools "Bash(gh pr review:*)" "Bash(gh pr comment:*)" "Bash(gh pr diff:*)" "Bash(gh pr view:*)"'
          prompt: |
            Follow the coding standards defined in .claude/skills/coding-standards.md.
            Follow project rules defined in CLAUDE.md.
            Review the PR diff. If you find issues, fix them by pushing commits.
            After reviewing, submit a formal review using the gh CLI:
            - If no issues: gh pr review <number> --approve --body "LGTM"
            - If issues remain: gh pr review <number> --request-changes --body "<summary>"
            The PR number is ${{ github.event.pull_request.number }}.
